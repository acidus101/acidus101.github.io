<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave, please</title>
<meta name="description" content="By go back, I mean leave this website." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --text:#222222;
    --text-muted:#717171;
    --border:#ebebeb;
    --border-strong:#dddddd;
    --brand:#ff385c;
    --brand-hover:#e00b41;
    --ring:rgba(255,56,92,.18);
    --shadow:0 6px 20px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  header{
    border-bottom:1px solid var(--border);
    padding:1.1rem 2.5rem;
    display:flex;
    align-items:center;
    background:#fff;
  }
  @media (max-width:640px){header{padding:1rem 1.25rem}}
  .logo{
    display:flex;align-items:center;gap:.5rem;
    color:var(--brand);font-weight:700;font-size:1.05rem;letter-spacing:-.01em;
    text-decoration:none;
  }
  .logo svg{width:28px;height:28px}

  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:3rem 1.5rem;
  }
  .card{
    width:100%;
    max-width:560px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3rem 2.5rem;
    text-align:center;
    box-shadow:var(--shadow);
    animation:pop .5s var(--ease) both;
  }
  @media (max-width:640px){.card{padding:2.25rem 1.5rem;border-radius:16px}}
  @keyframes pop{
    from{opacity:0;transform:translateY(12px) scale(.98)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .emoji{
    font-size:2.75rem;
    margin-bottom:1rem;
    display:inline-block;
    animation:wave 1.6s ease-in-out infinite;
    transform-origin:70% 70%;
  }
  @keyframes wave{
    0%,100%{transform:rotate(0deg)}
    20%{transform:rotate(14deg)}
    40%{transform:rotate(-8deg)}
    60%{transform:rotate(14deg)}
    80%{transform:rotate(-4deg)}
  }

  h1{
    font-size:clamp(1.5rem,3.5vw,2rem);
    font-weight:600;
    letter-spacing:-.02em;
    line-height:1.25;
    margin-bottom:1rem;
    color:var(--text);
  }
  p.message{
    font-size:1.0625rem;
    color:var(--text-muted);
    margin-bottom:2rem;
    max-width:460px;
    margin-left:auto;margin-right:auto;
  }

  .btn-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
    padding:.9rem 1.75rem;
    font-size:1rem;
    font-weight:600;
    font-family:inherit;
    border:none;cursor:pointer;
    border-radius:10px;
    text-decoration:none;
    transition:background .18s var(--ease),transform .12s var(--ease),box-shadow .18s var(--ease),border-color .18s var(--ease);
  }
  .btn-primary{
    background:linear-gradient(135deg,#e61e4d 0%,#e31c5f 50%,#d70466 100%);
    color:#fff;
  }
  .btn-primary:hover{
    background:linear-gradient(135deg,#d70466 0%,#bd1e59 50%,#a8134f 100%);
    box-shadow:0 8px 20px rgba(255,56,92,.25);
    transform:translateY(-1px);
  }
  .btn-ghost{
    background:#fff;
    color:var(--text);
    border:1px solid var(--border-strong);
  }
  .btn-ghost:hover{border-color:var(--text);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 4px var(--ring)}

  footer{
    border-top:1px solid var(--border);
    padding:1.25rem 2.5rem;
    font-size:.8rem;
    color:var(--text-muted);
    text-align:center;
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html" aria-label="Home">
    <svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M16 1c-2.5 0-4.6 1.8-5.3 4.2C8 14 2 19.5 2 24.5c0 3.6 2.9 6.5 6.5 6.5 2.5 0 4.7-1.4 7.5-4.6 2.8 3.2 5 4.6 7.5 4.6 3.6 0 6.5-2.9 6.5-6.5 0-5-6-10.5-8.7-19.3C20.6 2.8 18.5 1 16 1zm0 2c1.7 0 3.1 1.2 3.6 2.9C22.2 14.6 28 19.6 28 24.5c0 2.5-2 4.5-4.5 4.5-1.8 0-3.5-1.1-6-4-.6-.7-1.6-.7-2.2 0-2.5 2.9-4.2 4-6 4C6.8 29 5 27 5 24.5 5 19.6 10.8 14.6 12.4 5.9 12.9 4.2 14.3 3 16 3z"/></svg>
    <span>acidus101</span>
  </a>
</header>

<main>
  <section class="card" role="status" aria-live="polite">
    <div class="emoji" aria-hidden="true">👋</div>
    <h1>By "go back," I meant leave this website.</h1>
    <p class="message">Really. There's nothing else here for you. Thanks for stopping by.</p>
    <div class="btn-row">
      <a href="https://www.google.com" class="btn btn-primary">
        Okay, bye
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="index.html" class="btn btn-ghost">Wait, go back</a>
    </div>
  </section>
</main>

<footer>
  © <span id="year"></span> acidus101
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
